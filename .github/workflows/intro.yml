name: A basic flow with 2 jobs
on: push

jobs:
  job_1:
    name: first job to run
    runs-on: ubuntu-latest
    steps: 
      - name: Step-one
        uses: actions/checkout@v4
      - name: Step-two
        run: ls -1
      - name: Step-three
        run: pwd

  job_2:
    name: Second job to run
    runs-on: windows-latest
    steps:
      - name: Step one of job_2
        uses: actions/checkout@v4
      - name: step two of job_2
        run: pwd
